<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的技术博客</title>
    <style>
        :root {
            --bg: #faf9f7;
            --bg-card: #ffffff;
            --bg-hover: #f5f3f0;
            --text: #2d2a26;
            --text-secondary: #6b6560;
            --text-muted: #9a9590;
            --accent: #c45c3e;
            --accent-light: #e07a5f;
            --accent-bg: #fdf2ef;
            --border: #e8e4df;
            --shadow: 0 2px 12px rgba(45,42,38,0.06);
            --shadow-lg: 0 8px 32px rgba(45,42,38,0.10);
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.75;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.85);
        }
        .nav {
            max-width: 800px; margin: 0 auto;
            padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            font-size: 1.3rem; font-weight: 700;
            color: var(--accent);
            text-decoration: none;
            display: flex; align-items: center; gap: 8px;
        }
        .logo::before { content: "✦"; font-size: 1.1rem; }
        .nav-btn {
            background: var(--accent);
            color: white; border: none;
            padding: 8px 20px;
            border-radius: 24px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .nav-btn:hover { background: var(--accent-light); transform: translateY(-1px); }

        /* Main */
        main { max-width: 800px; margin: 0 auto; padding: 40px 24px; }

        /* Hero */
        .hero {
            text-align: center;
            padding: 60px 0 48px;
        }
        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        .hero p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Article List */
        .article-list { display: flex; flex-direction: column; gap: 20px; }
        .article-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .article-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-light);
        }
        .article-card::before {
            content: "";
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .article-card:hover::before { opacity: 1; }
        .article-meta {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 10px;
            font-size: 0.82rem;
            color: var(--text-muted);
        }
        .article-tag {
            background: var(--accent-bg);
            color: var(--accent);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .article-card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }
        .article-card .summary {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .article-actions {
            display: flex; gap: 12px;
            margin-top: 16px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .article-card:hover .article-actions { opacity: 1; }
        .action-btn {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }
        .action-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-light); }
        .action-btn.delete:hover { background: #fdf2f2; color: #c0392b; border-color: #e07a7a; }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }

        /* Editor Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(45,42,38,0.35);
            backdrop-filter: blur(8px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card);
            border-radius: var(--radius);
            width: 100%; max-width: 720px;
            max-height: 90vh;
            overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: var(--shadow-lg);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-header {
            padding: 24px 28px 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h2 { font-size: 1.3rem; font-weight: 600; }
        .modal-close {
            background: none; border: none;
            font-size: 1.5rem; color: var(--text-muted);
            cursor: pointer; padding: 4px;
            line-height: 1;
        }
        .modal-close:hover { color: var(--text); }
        .modal-body {
            padding: 20px 28px;
            overflow-y: auto;
            flex: 1;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-light);
            box-shadow: 0 0 0 3px var(--accent-bg);
        }
        .form-group textarea {
            min-height: 320px;
            resize: vertical;
            line-height: 1.8;
            font-size: 0.92rem;
        }
        .form-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
        .modal-footer {
            padding: 16px 28px 24px;
            display: flex; justify-content: flex-end; gap: 12px;
            border-top: 1px solid var(--border);
        }
        .btn {
            padding: 10px 24px;
            border-radius: 24px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-light); transform: translateY(-1px); }
        .btn-secondary { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg-hover); }

        /* Article View */
        .article-view {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 48px;
            display: none;
        }
        .article-view.active { display: block; }
        .article-view-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        .article-view-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .article-view-body {
            font-size: 1rem;
            line-height: 1.9;
            color: var(--text);
        }
        .article-view-body p { margin-bottom: 1.2em; }
        .article-view-body h2 {
            font-size: 1.4rem;
            margin: 1.8em 0 0.8em;
            color: var(--accent);
        }
        .article-view-body h3 {
            font-size: 1.15rem;
            margin: 1.5em 0 0.6em;
            color: var(--text);
        }
        .article-view-body ul, .article-view-body ol {
            margin: 0 0 1.2em 1.5em;
        }
        .article-view-body li { margin-bottom: 0.4em; }
        .article-view-body code {
            background: #f0ede9;
            padding: 2px 8px;
            border-radius: 5px;
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 0.88em;
            color: var(--accent);
        }
        .article-view-body pre {
            background: #f5f3f0;
            padding: 20px;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            margin: 1.2em 0;
            border: 1px solid var(--border);
        }
        .article-view-body pre code {
            background: none;
            padding: 0;
            color: var(--text);
        }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .back-btn:hover { color: var(--accent); }

        /* Toast */
        .toast {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--text); color: white;
            padding: 12px 28px;
            border-radius: 24px;
            font-size: 0.9rem;
            z-index: 300;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-lg);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 640px) {
            .hero h1 { font-size: 1.6rem; }
            .article-view { padding: 24px; }
            .form-row { grid-template-columns: 1fr; }
            .article-card { padding: 20px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <header>
        <nav class="nav">
            <a href="#" class="logo" onclick="showList()">我的技术博客</a>
            <button class="nav-btn" onclick="openEditor()">+ 写文章</button>
        </nav>
    </header>

    <main>
        <!-- List View -->
        <div id="listView">
            <div class="hero">
                <h1>记录思考，沉淀技术</h1>
                <p>从 minimind-o 复现到 Kimi-3 架构分析，写给自己看。</p>
            </div>
            <div class="article-list" id="articleList"></div>
        </div>

        <!-- Article View -->
        <div id="articleView" class="article-view">
            <a class="back-btn" onclick="showList()">← 返回列表</a>
            <div class="article-view-header">
                <div class="article-meta" id="viewMeta"></div>
                <h1 id="viewTitle"></h1>
            </div>
            <div class="article-view-body" id="viewBody"></div>
        </div>
    </main>

    <!-- Editor Modal -->
    <div class="modal-overlay" id="editorModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="editorTitle">写文章</h2>
                <button class="modal-close" onclick="closeEditor()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>标题</label>
                        <input type="text" id="inputTitle" placeholder="给文章起个标题...">
                    </div>
                    <div class="form-group">
                        <label>标签</label>
                        <select id="inputTag">
                            <option value="架构分析">架构分析</option>
                            <option value="复现笔记">复现笔记</option>
                            <option value="Bug 排查">Bug 排查</option>
                            <option value="读书笔记">读书笔记</option>
                            <option value="随想">随想</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>摘要（可选）</label>
                    <input type="text" id="inputSummary" placeholder="简短描述文章内容...">
                </div>
                <div class="form-group">
                    <label>正文（支持 Markdown 语法）</label>
                    <textarea id="inputBody" placeholder="开始写作...

支持简单 Markdown：
# 一级标题
## 二级标题
**粗体**
`代码`
- 列表项"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditor()">取消</button>
                <button class="btn btn-primary" onclick="saveArticle()">保存</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Storage
        const STORAGE_KEY = 'my_tech_blog_articles';
        let articles = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let editingId = null;

        // Demo data
        if (articles.length === 0) {
            articles = [
                {
                    id: 'demo1',
                    title: 'Kimi-3 架构思考：2.8T MoE 的设计哲学',
                    tag: '架构分析',
                    summary: '从 K2 到 K3，Moonshot 如何在一年内将参数规模从 1T 推至 2.8T，同时保持 32B 激活？',
                    body: `## 从 K2 到 K3：规格跃迁

Kimi 系列在过去一年内经历了极为密集的迭代。K2（2025.07）以 1T 总参数出道；K2.5 加入原生多模态；K3 则是集大成者。

## MoE 路由：从 384 到 896 专家

K3 将专家数量扩展至 896 个，每 token 仅激活 16 个专家。这种设计带来了几个关键影响：

- **稀疏度提升**：激活比例进一步降低
- **专家特化**：每个专家覆盖更细粒度的知识领域
- **负载均衡挑战**：需要更精细的路由设计

## 对小型 Omni 模型的启示

1. **解耦思维**：Thinker-Talker 解耦让语言理解和语音生成各司其职
2. **稀疏即正义**：小模型可以在局部做专家混合
3. **上下文是护城河**：1M 上下文让模型真正具备"读完再答"的能力`,
                    date: '2026-07-19'
                },
                {
                    id: 'demo2',
                    title: 'MiniMind-O 复现：0.1B Omni 模型的踩坑记录',
                    tag: '复现笔记',
                    summary: '从 SigLIP2 + SenseVoice 编码器到 Mimi 音频解码，单卡 3090 跑通全模态链路。',
                    body: `## 代码结构

\`\`\`
minimind-o/
├── model/model_omni.py      # Thinker + Talker + Bridge
├── model/projector.py       # 2层 MLP 投影器
└── train_sft_omni.py        # 三阶段训练
\`\`\`

## 关键发现

**Bridge 层**取中间层而非最后一层，避免被 LM head 过度塑形。

Talker 用 MTP 同时预测 8 层 Mimi codebook，维度别太小，384/512 维中长句容易漏词。`,
                    date: '2026-07-18'
                }
            ];
            saveToStorage();
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(articles));
        }

        // Render list
        function renderList() {
            const list = document.getElementById('articleList');
            if (articles.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📝</div>
                        <p>还没有文章，点击右上角"写文章"开始吧</p>
                    </div>`;
                return;
            }
            // Sort by date desc
            const sorted = [...articles].sort((a, b) => new Date(b.date) - new Date(a.date));
            list.innerHTML = sorted.map(a => `
                <div class="article-card" onclick="viewArticle('${a.id}')">
                    <div class="article-meta">
                        <span>${a.date}</span>
                        <span class="article-tag">${a.tag}</span>
                    </div>
                    <h3>${escapeHtml(a.title)}</h3>
                    <p class="summary">${escapeHtml(a.summary || a.body.slice(0, 120) + '...')}</p>
                    <div class="article-actions" onclick="event.stopPropagation()">
                        <button class="action-btn" onclick="editArticle('${a.id}')">编辑</button>
                        <button class="action-btn delete" onclick="deleteArticle('${a.id}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        // Simple Markdown parser
        function parseMarkdown(text) {
            return text
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^\- (.*$)/gim, '<li>$1</li>')
                .replace(/(<li>.*<\/li>
?)+/g, '<ul>$&</ul>')
                .replace(/<\/ul>\s*<ul>/g, '')
                .replace(/
/g, '<br>');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // View article
        function viewArticle(id) {
            const a = articles.find(x => x.id === id);
            if (!a) return;
            document.getElementById('viewMeta').innerHTML = `
                <span>${a.date}</span>
                <span class="article-tag">${a.tag}</span>
            `;
            document.getElementById('viewTitle').textContent = a.title;
            document.getElementById('viewBody').innerHTML = parseMarkdown(a.body);
            document.getElementById('listView').style.display = 'none';
            document.getElementById('articleView').classList.add('active');
            window.scrollTo(0, 0);
        }

        function showList() {
            document.getElementById('listView').style.display = 'block';
            document.getElementById('articleView').classList.remove('active');
        }

        // Editor
        function openEditor() {
            editingId = null;
            document.getElementById('editorTitle').textContent = '写文章';
            document.getElementById('inputTitle').value = '';
            document.getElementById('inputTag').value = '架构分析';
            document.getElementById('inputSummary').value = '';
            document.getElementById('inputBody').value = '';
            document.getElementById('editorModal').classList.add('active');
        }

        function closeEditor() {
            document.getElementById('editorModal').classList.remove('active');
        }

        function editArticle(id) {
            const a = articles.find(x => x.id === id);
            if (!a) return;
            editingId = id;
            document.getElementById('editorTitle').textContent = '编辑文章';
            document.getElementById('inputTitle').value = a.title;
            document.getElementById('inputTag').value = a.tag;
            document.getElementById('inputSummary').value = a.summary || '';
            document.getElementById('inputBody').value = a.body;
            document.getElementById('editorModal').classList.add('active');
        }

        function saveArticle() {
            const title = document.getElementById('inputTitle').value.trim();
            const tag = document.getElementById('inputTag').value;
            const summary = document.getElementById('inputSummary').value.trim();
            const body = document.getElementById('inputBody').value.trim();

            if (!title) { showToast('请填写标题'); return; }
            if (!body) { showToast('请填写正文'); return; }

            const now = new Date().toISOString().split('T')[0];

            if (editingId) {
                const idx = articles.findIndex(x => x.id === editingId);
                if (idx >= 0) {
                    articles[idx] = { ...articles[idx], title, tag, summary, body };
                }
            } else {
                articles.push({
                    id: 'art_' + Date.now(),
                    title, tag, summary, body,
                    date: now
                });
            }

            saveToStorage();
            closeEditor();
            renderList();
            showToast(editingId ? '文章已更新' : '文章已保存');
        }

        function deleteArticle(id) {
            if (!confirm('确定要删除这篇文章吗？')) return;
            articles = articles.filter(x => x.id !== id);
            saveToStorage();
            renderList();
            showToast('文章已删除');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // Close modal on overlay click
        document.getElementById('editorModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditor();
        });

        // Init
        renderList();
    </script>
</body>
</html>
